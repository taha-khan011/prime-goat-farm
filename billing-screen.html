<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Goat Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --green-text: #124C36;
            --white-text: #FFFFFFFF;
            --black-text: black;

            --inner-bg: whitesmoke;
            --white-bg: #FFFFFF;
            --black-bg: black;
            --dark-black-bg: #161A1DFF;
            --green-bg: #124C36;
            --transparent-green-bg: #32a14aa2;

            --border-bg: black;

            --heading-font: inter;
            --para-font: work-sans;
        }

        body {
            font-family: Arial;
            background: var(--white-bg);
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        /* FORM */
        .form-container {
            background: var(--inner-bg);
            border: 2px solid var(--border-bg);
            padding: 20px;
        }

        .form-container h2 {
            text-align: center;
        }

        .form-container>h2 img,
        .bill>h2 img {
            width: 100px;
        }

        #package {
            width: 100%;
        }

        input,
        select {
            width: 95%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 2px solid var(--border-bg);
            border-radius: 8px;
        }

        input::placeholder{
            color: var(--black-text);
        }

        input[type="file"]::file-selector-button {
            border-radius: 8px;
            /* Adjust this value for more or less rounding */
            border-color: var(--border-bg);
            background-color: var(--white-bg);
            cursor: pointer;
        }



        button {
            width: 100%;
            padding: 12px;
            background: var(--black-bg);
            border: none;
            color: var(--white-text);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: var(--green-text);
        }

        /* BILL */
        .bill {
            margin-top: 20px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }

        .bill h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            background-color: var(--inner-bg);
            padding: 8px 0;
        }

        .label {
            font-weight: bold;
        }

        .verified {
            color: var(--green-text);
            font-weight: bold;
        }

        /* DOWNLOAD BUTTON */
        .download-btn {
            margin-top: 10px;
            background: var(--black-bg);
        }
    </style>
</head>

<body>

    <div class="toast-container position-fixed top-0 end-0 p-3">

        <div id="liveToast" class="toast text-white border-0 fade hide" role="alert" data-bs-delay="2500">
            <div class="d-flex">
                <div class="toast-body" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>

    </div>

    <div class="container">

        <!-- FORM -->
        <div class="form-container" id="formBox">
            <h2><img src="./Assets/Images/prime goat farm logo pic png01.png" alt=""> Prime Goat Billing</h2>

            <input id="name" placeholder="Full Name">
            <input id="phone" placeholder="Phone Number">
            <input id="date" type="date">
            <input id="color" placeholder="Animal Color">

            <select id="package">
                <option>Select Package</option>
                <option>Goat Basic</option>
                <option>Goat Premium</option>
                <option>Cattle Standard</option>
            </select>

            <input id="amount" type="number" placeholder="Amount">
            <input id="screenshot" type="file">

            <button onclick="generateBill()">Done Generate Bill</button>
        </div>

        <!-- BILL -->
        <div class="bill" id="bill">

            <h2><img src="./Assets/Images/prime goat farm logo pic png01.png" alt=""> Prime Goat Receipt</h2>

            <div class="row">
                <div class="label">Name</div>
                <div id="b_name"></div>
            </div>
            <div class="row">
                <div class="label">Phone</div>
                <div id="b_phone"></div>
            </div>
            <div class="row">
                <div class="label">Date</div>
                <div id="b_date"></div>
            </div>
            <div class="row">
                <div class="label">Animal Color</div>
                <div id="b_color"></div>
            </div>
            <div class="row">
                <div class="label">Package</div>
                <div id="b_package"></div>
            </div>
            <div class="row">
                <div class="label">Payment-screenshot</div>
                <div id="b_payment" class="verified"></div>
            </div>
            <div class="row">
                <div class="label">Amount</div>
                <div id="b_amount"></div>
            </div>

            <button class="download-btn" onclick="downloadBill()">Download Receipt</button>

        </div>

    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script>

        function showToast(message, type = "success") {

            let toastEl = document.getElementById("liveToast");
            let toastMsg = document.getElementById("toastMsg");

            toastMsg.innerText = message;

            // reset colors
            toastEl.classList.remove("bg-success", "bg-danger");

            // apply color
            if (type === "success") {
                toastEl.classList.add("bg-success");
            } else {
                toastEl.classList.add("bg-danger");
            }

            // bootstrap toast instance (IMPORTANT)
            let toast = bootstrap.Toast.getOrCreateInstance(toastEl);

            toast.show();
        }

        function generateBill() {

            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let date = document.getElementById("date").value;
            let color = document.getElementById("color").value;
            let pkg = document.getElementById("package").value;
            let amount = document.getElementById("amount").value;
            let file = document.getElementById("screenshot").files.length;

            // ❌ VALIDATION
            if (name === "" || phone === "" || date === "" || color === "" || pkg === "Select Package" || amount === "" || file === 0) {
                showToast("Please fill all inputs", "danger");
                return;
            }

            // ✅ DATA SET
            document.getElementById("b_name").innerText = name;
            document.getElementById("b_phone").innerText = phone;
            document.getElementById("b_date").innerText = date;
            document.getElementById("b_color").innerText = color;
            document.getElementById("b_package").innerText = pkg;
            document.getElementById("b_amount").innerText = "PKR " + amount;

            // ✅ Screenshot check → VERIFIED show
            document.getElementById("b_payment").innerHTML = '<img src="/Assets/Icons/verified.png" width="30"><span>Verified</span>';

            // UI switch
            document.getElementById("bill").style.display = "block";
            document.getElementById("formBox").style.display = "none";

            showToast("Bill generated successfully 😎", "success");

        }

        function downloadBill() {

            let file = document.getElementById("screenshot").files.length;

            if (file === 0) {
                showToast("Please attach screenshot", "danger");
                return;
            }

            const bill = document.getElementById("bill");
            const btn = document.querySelector(".download-btn");

            btn.style.display = "none";

            html2canvas(bill).then(canvas => {

                let link = document.createElement("a");
                link.download = "Prime-Goat-Bill.png";
                link.href = canvas.toDataURL();
                link.click();

                btn.style.display = "block";
            });

            showToast("Receipt downloaded successfully 😎", "success");
        }


    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
