<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Goat Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: inter;
            src: url(/Assets/Fonts/Inter_28pt-Bold.ttf);
        }

        @font-face {
            font-family: work-sans;
            src: url(/Assets/Fonts/WorkSans-Regular.ttf);
        }

        * {
            margin: 0;
            padding: 0;
        }

        :root {
            --green-text: #124C36;
            --white-text: #FFFFFFFF;
            --black-text: black;

            --inner-bg: whitesmoke;
            --white-bg: #FFFFFF;
            --black-bg: black;
            --dark-black-bg: #161A1DFF;
            --green-bg: #124C36;
            --transparent-green-bg: #32a14aa2;

            --border-bg: black;

            --heading-font: inter;
            --para-font: work-sans;
        }

        body {
            background: var(--white-bg);
        }

        /* nav */

        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 99;
            background-color: var(--white-bg);
            border-bottom: 1px solid var(--border-bg);
        }

        .IconPrime {
            width: 90px;
            height: 100px;
            position: relative;
            right: 20px;
            top: 5px;
        }

        .nav-child {
            width: calc(87.5% - 100px);
            height: 81px;
            display: flex;
            align-items: center;
        }

        .nav-child ul {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 24px;
            list-style: none;
        }

        .nav-child ul li a {
            color: var(--black-text);
            font-family: var(--para-font);
            font-weight: 600;
            font-size: clamp(13px, 1.2vw, 15px);
            position: relative;
            text-decoration: none;
            color: var(--black-text);
            transition: color 0.3s ease;
        }

        .nav-child ul li a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: var(--green-text);
            transition: width 0.3s ease;
        }

        .nav-child ul li a:hover::after {
            width: 100%;
        }

        .nav-child ul li a.active {
            color: var(--green-text);
        }

        .nav-child ul li a.active::after {
            width: 100%;
        }

        .nav-child ul li:first-child a::after {
            display: none;
        }

        .nav-child ul li:first-child a:hover {
            color: initial;
        }

        .nav-child ul li:first-child a {
            color: var(--green-text);
            font-size: clamp(19px, 1.8vw, 29px);
            font-weight: 700;
            font-family: var(--para-font);
        }

        .nav-child ul li:nth-child(2) a {
            color: var(--green-text);
        }

        .nav-hamburger-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: auto;
            padding: 8px;
        }

        .nav-hamburger-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--black-bg);
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .nav-hamburger-btn.nav-btn-active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .nav-hamburger-btn.nav-btn-active span:nth-child(2) {
            opacity: 0;
        }

        .nav-hamburger-btn.nav-btn-active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .offscreen-menu {
            display: none;
            width: 100%;
            background-color: var(--white-bg);
            overflow: hidden;
            max-height: 0;
            transition: max-height .7s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            border-bottom: 1px solid var(--border-bg);
            top: 81px;
            left: 0;
            z-index: 98;
        }

        .offscreen-menu.offscreen-open {
            max-height: 400px;
        }

        .offscreen-menu-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0 24px;
        }

        .offscreen-menu-inner ul {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 88%;
        }

        .offscreen-menu-inner ul li {
            border-bottom: 1px solid var(--border-bg);
        }

        .offscreen-menu-inner ul li:last-child {
            border-bottom: none;
        }

        .offscreen-menu-inner ul li a {
            display: block;
            padding: 14px 8px;
            color: var(--black-text);
            font-family: var(--para-font);
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease, padding-left 0.2s ease;
        }

        .offscreen-menu-inner ul li a:hover {
            color: var(--green-text);
            padding-left: 18px;
        }

        .offscreen-overlay {
            display: none;
            position: fixed;
            top: 81px;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 97;
        }

        .offscreen-overlay.offscreen-overlay-visible {
            display: block;
        }

        .offscreen-menu-inner ul li:first-child a {
            color: var(--green-text);
        }

        @media (max-width: 820px) {
            nav {
                height: 100%;
            }

            .offscreen-menu {
                top: 70px;
            }

            .nav-child ul li:not(:first-child) {
                display: none;
            }

            .nav-hamburger-btn {
                display: flex;
            }

            nav>a {
                display: none;
            }

            .nav-child {
                width: 88%;
                justify-content: space-between;
            }

            .offscreen-menu {
                display: block;
            }
        }

        @media (min-width: 821px) {
            .nav-child {
                width: 88%;
            }

            .nav-hamburger-btn {
                display: none;
            }

            .offscreen-menu {
                display: none !important;
            }

            .offscreen-overlay {
                display: none !important;
            }
        }

        /* FORM */
        .form-container {
            margin-top: 50px;
            background: var(--inner-bg);
            border: 2px solid var(--border-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container h2 {
            text-align: center;
        }

        .form-container>h2 img,
        .bill>h2 img {
            width: 100px;
        }

        #package {
            width: 100%;
        }

        input,
        select {
            width: 95%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 2px solid var(--border-bg);
            border-radius: 8px;
        }

        #package {
            width: 95%;
        }

        input::placeholder {
            color: var(--black-text);
        }

        input[type="file"]::file-selector-button {
            border-radius: 8px;
            border-color: var(--border-bg);
            background-color: var(--white-bg);
            cursor: pointer;
        }

        button {
            width: 95%;
            padding: 12px;
            background: var(--black-bg);
            border: none;
            color: var(--white-text);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: var(--green-text);
        }

        /* BILL */
        .bill {
            margin-top: 20px;
            background: var(--white-bg);
            border: 2px solid var(--border-bg);
            padding: 20px;
            display: none;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            background-color: var(--inner-bg);
            padding: 8px 10px;
            margin-bottom: 6px;
        }

        .label {
            font-weight: bold;
            font-family: var(--heading-font);
            width: 40%;
        }

        .row div {
            width: 60%;
            text-align: right;
        }

        .row span,
        .row div {
            display: inline-block;
        }

        .bill h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .row {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            background-color: var(--inner-bg);
        }

        .label {
            font-weight: bold;
        }

        .verified {
            color: var(--green-text);
            font-weight: bold;
        }

        /* SCREENSHOT INSIDE BILL */
        /* ====================== */
        .bill-screenshot-section {
            margin-top: 12px;
            width: 100%;
        }

        .bill-screenshot-section h4 {
            font-family: var(--heading-font);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            padding: 8px 10px;
            background-color: var(--inner-bg);
        }

        .bill-screenshot-section img {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid var(--border-bg);
        }

        .download-btn-wrapper {
            margin-top: 12px;
            margin-bottom: 40px;
            display: none;
        }

        .download-btn-wrapper button {
            width: 100%;
            background: var(--black-bg);
        }

        .download-btn-wrapper button:hover {
            background: var(--green-text);
        }
    </style>
</head>

<body>

    <!-- nav-bar -->
    <nav>
        <div class="nav-child">
            <ul>
                <li><a href="/index.html"><img class="IconPrime" src="./Assets/Images/prime goat farm logo pic png01.png"
                            alt=""></a></li>
                <li><a href="/index.html" class="active">Home</a></li>
                <li><a href="/introduction.html">Introduction</a></li>
                <li><a href="/service.html">Services</a></li>
                <li><a href="/location.html">Contact Us</a></li>
            </ul>

            <!-- Hamburger Btn -->
            <button class="nav-hamburger-btn" id="navHamburgerBtn" aria-label="Toggle menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Overlay -->
    <div class="offscreen-overlay" id="offscreenOverlay"></div>

    <!-- Offscreen Menu -->
    <div class="offscreen-menu" id="offscreenMenu" aria-hidden="true">
        <div class="offscreen-menu-inner">
            <ul>
                <li><a href="/index.html" class="offscreen-link">Home</a></li>
                <li><a href="/introduction.html" class="offscreen-link">Introduction</a></li>
                <li><a href="/service.html" class="offscreen-link">Services</a></li>
                <li><a href="/location.html" class="offscreen-link">Contact Us</a></li>
            </ul>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast text-white border-0 fade hide" role="alert" data-bs-delay="2500">
            <div class="d-flex">
                <div class="toast-body" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="container">

        <div class="form-container" id="formBox">
            <h2><img src="./Assets/Images/prime goat farm logo pic png01.png" alt="">
                <p>Prime Goat Billing</p>
            </h2>

            <input id="name" placeholder="Full Name">
            <input id="phone" placeholder="Phone Number">
            <input id="date" type="date">
            <input id="color" placeholder="Animal Color">

            <select id="package">
                <option>Select Package</option>
                <option>Goat Basic</option>
                <option>Goat Premium</option>
                <option>Cattle Standard</option>
            </select>

            <input id="amount" type="number" placeholder="Amount">
            <label for="screenshot"
                style="font-weight:600; display:block; margin:10px 0 5px; font-family: var(--para-font);">
                Attach Payment Screenshot
            </label>

            <input id="screenshot" type="file">

            <button onclick="generateBill()">Done Generate Bill</button>
        </div>

        <div class="bill" id="bill">

            <h2>
                <img src="./Assets/Images/prime goat farm logo pic png01.png" alt="">
                <p>Prime Goat Receipt</p>
            </h2>

            <div class="row">
                <span class="label">Name</span>
                <div id="b_name"></div>
            </div>

            <div class="row">
                <span class="label">Phone</span>
                <div id="b_phone"></div>
            </div>

            <div class="row">
                <span class="label">Date</span>
                <div id="b_date"></div>
            </div>

            <div class="row">
                <span class="label">Animal Color</span>
                <div id="b_color"></div>
            </div>

            <div class="row">
                <span class="label">Package</span>
                <div id="b_package"></div>
            </div>

            <div class="row">
                <span class="label">Payment</span>
                <div id="b_payment" class="verified"></div>
            </div>

            <div class="row">
                <span class="label">Amount</span>
                <div id="b_amount"></div>
            </div>

            <div class="bill-screenshot-section" id="screenshotPreview" style="display:none;">
                <h4>Payment Screenshot</h4>
                <img id="b_screenshot" alt="Payment Screenshot">
            </div>

        </div>

        <div class="download-btn-wrapper" id="downloadWrapper">
            <button onclick="downloadBill()">Download Receipt</button>
        </div>

    </div>


    <script>

        const navBtn = document.getElementById('navHamburgerBtn');
        const offscreenMenu = document.getElementById('offscreenMenu');
        const offscreenOverlay = document.getElementById('offscreenOverlay');
        const offscreenLinks = document.querySelectorAll('.offscreen-link');

        function openOffscreenMenu() {
            offscreenMenu.classList.add('offscreen-open');
            offscreenOverlay.classList.add('offscreen-overlay-visible');
            navBtn.classList.add('nav-btn-active');
            navBtn.setAttribute('aria-expanded', 'true');
            offscreenMenu.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden'; // scroll band
            trapFocus();
        }

        function closeOffscreenMenu() {
            offscreenMenu.classList.remove('offscreen-open');
            offscreenOverlay.classList.remove('offscreen-overlay-visible');
            navBtn.classList.remove('nav-btn-active');
            navBtn.setAttribute('aria-expanded', 'false');
            offscreenMenu.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = ''; // scroll wapas
            navBtn.focus();
        }

        function trapFocus() {
            const focusable = Array.from(
                offscreenMenu.querySelectorAll('a[href], button:not([disabled])')
            );
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (first) first.focus();

            function handleTab(e) {
                if (e.key !== 'Tab') return;
                if (e.shiftKey) {
                    if (document.activeElement === first) {
                        e.preventDefault();
                        last.focus();
                    }
                } else {
                    if (document.activeElement === last) {
                        e.preventDefault();
                        first.focus();
                    }
                }
            }
            document.addEventListener('keydown', handleTab);
        }

        navBtn.addEventListener('click', () => {
            offscreenMenu.classList.contains('offscreen-open') ?
                closeOffscreenMenu() :
                openOffscreenMenu();
        });

        offscreenOverlay.addEventListener('click', closeOffscreenMenu);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeOffscreenMenu();
        });

        offscreenLinks.forEach(link => {
            link.addEventListener('click', closeOffscreenMenu);
        });

        function generateBill() {

            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let date = document.getElementById("date").value;
            let color = document.getElementById("color").value;
            let pkg = document.getElementById("package").value;
            let amount = document.getElementById("amount").value;
            let file = document.getElementById("screenshot").files[0];

            if (!name || !phone || !date || !color || pkg === "Select Package" || !amount || !file) {
                showToast("Please fill all inputs", "danger");
                return;
            }

            document.getElementById("b_name").innerText = name;
            document.getElementById("b_phone").innerText = phone;
            document.getElementById("b_date").innerText = date;
            document.getElementById("b_color").innerText = color;
            document.getElementById("b_package").innerText = pkg;
            document.getElementById("b_amount").innerText = "PKR " + amount;

            document.getElementById("b_payment").innerHTML =
                '<img src="/Assets/Icons/verified.png" width="25"> Verified';

            // Screenshot load karke receipt ke andar dikhao
            let reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById("b_screenshot").src = e.target.result;
                document.getElementById("screenshotPreview").style.display = "block";

                // Sab ready hone ke baad bill aur download btn dikhao
                document.getElementById("bill").style.display = "block";
                document.getElementById("downloadWrapper").style.display = "block";
                document.getElementById("formBox").style.display = "none";

                showToast("Bill generated successfully 😎", "success");
            };
            reader.readAsDataURL(file);
        }

        function downloadBill() {

            const bill = document.getElementById("bill");
            // Download button receipt ke bahar hai isliye hide karne ki zaroorat nahi

            html2canvas(bill, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff",
                allowTaint: true
            }).then(canvas => {
                let link = document.createElement("a");
                link.download = "Prime-Goat-Receipt.png";
                link.href = canvas.toDataURL("image/png");
                link.click();

                showToast("Receipt downloaded successfully 😎", "success");
            });
        }

        // Toast function (agar pehle se nahi hai to yeh use karo)
        function showToast(msg, type) {
            const toastEl = document.getElementById("liveToast");
            const toastMsg = document.getElementById("toastMsg");
            toastMsg.innerText = msg;
            toastEl.classList.remove("bg-success", "bg-danger");
            toastEl.classList.add(type === "success" ? "bg-success" : "bg-danger");
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

    </script>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
